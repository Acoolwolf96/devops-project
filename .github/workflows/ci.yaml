


name: DevOps Project CI Pipeline

on:
  push:
    branches: 
      - main


jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Set short SHA
      run: |
        echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
    - name: Build and push Docker image
      run: |
        docker build -t acoolwolf/devops-project:${{ env.SHORT_SHA }} .
    - name: login to DockerHub
      run: |
        echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
    - name: Push Docker image
      run: |
        docker push acoolwolf/devops-project:${{ env.SHORT_SHA }}
    - name: Configure Git Author
      run: |
        git config --local user.email "mandy@acoolwolf.com"
        git config --local user.name "acoolwolf"
    - name: Update Helm chart with new image tag
      run: |
        sed -i "s/tag: .*/tag: ${{ env.SHORT_SHA }}/" ./devops-project-app/values.yaml
        git add ./devops-project-app/values.yaml
        git commit -m "Update image tag to ${{ env.SHORT_SHA }}"
        git push origin main